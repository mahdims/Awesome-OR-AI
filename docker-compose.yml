services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ri_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ri_dev}
      POSTGRES_DB: ${POSTGRES_DB:-research_intelligence}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ri} -d ${POSTGRES_DB:-research_intelligence}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ri_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: ri_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Override DSN/Redis to use docker-network names (laptop .env uses 127.0.0.1)
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ri}:${POSTGRES_PASSWORD:-ri_dev}@postgres:5432/${POSTGRES_DB:-research_intelligence}
      REDIS_URL: redis://redis:6379/0
      ENV: ${ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # JWT_SECRET is required (no default). Generate: openssl rand -hex 64
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (openssl rand -hex 64)}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}  # localhost dev → no TLS
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8080/auth/google/callback}
      BOOTSTRAP_ADMIN_EMAILS: ${BOOTSTRAP_ADMIN_EMAILS:-}
    volumes:
      # Bind-mount the repo for live reload during dev. On prod, replace this
      # with a no-mount build so the image's COPY is the source of truth.
      - ./:/app
    ports:
      - "127.0.0.1:8080:80"
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "80", "--reload"]

volumes:
  pg_data:
  redis_data:
