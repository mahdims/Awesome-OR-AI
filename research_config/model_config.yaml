# LLM Model Configuration
# This file defines which LLM models to use for each processing stage.
# Each model can be configured with provider, model_name, temperature, and max_tokens.

# Layer 0: Fetch and score
# Used for relevance scoring of papers (0-10 scale) with researcher context
layer0:
  relevance_scorer:
    provider: "gemini"  # Options: "openai", "gemini", "anthropic"
    model_name: "gemini-2.5-flash"
    temperature: 0.0
    max_tokens: 0  # Short structured output (just a score)
    structured_output: true  # Use structured output for reliable JSON parsing

# Layer 1: Deep paper analysis
# Multi-agent pipeline for extracting detailed understanding from PDFs
layer1:
  reader:
    provider: "gemini"
    model_name: "gemini-2.5-flash"
    temperature: 0.0
    max_tokens: 0  # 0 = no limit, let model decide

  methods_extractor:
    provider: "gemini"
    model_name: "gemini-2.5-flash"
    temperature: 0.0
    max_tokens: 0

  positioning:
    provider: "gemini"
    model_name: "gemini-3-pro-preview"
    temperature: 0.0
    max_tokens: 0

# Layer 2: Bibliometric front detection
# Used for summarizing research fronts detected through citation analysis
layer2:
  front_summarizer:
    provider: "gemini"
    model_name: "gemini-2.5-flash"
    temperature: 0.3  # Slightly creative for trend descriptions
    max_tokens: 0

  embedding:
    model_name: "text-embedding-3-large"  # OpenAI best embedding model
    batch_size: 100
    # --- Three independent tuning knobs ---
    cosine_threshold: 0.60      # Min cosine to register embedding similarity; removes ~0.65 domain baseline
    embedding_weight: 0.90       # Embedding's share of the 0-1 score vs tag signals  (0=tags only, 1=embedding only)
    semantic_edge_weight: 5.0    # How much all semantic edges count vs citation edges (1=equal, 2=double, 0=disable)

# Layer 3: Living reviews and email generation
# Used for maintaining living literature reviews with daily/weekly/monthly cycles
layer3:
  daily_updater:
    provider: "gemini"
    model_name: "gemini-3-flash-preview"
    temperature: 0.3
    max_tokens: 8000

  weekly_revisor:
    provider: "gemini"
    model_name: "gemini-3-flash-preview"
    temperature: 0.3
    max_tokens: 8000

  monthly_rewriter:
    provider: "gemini"
    model_name: "gemini-3-flash-preview"
    temperature: 0.5  # More creative for major restructuring
    max_tokens: 8000

  email_generator:
    provider: "gemini"
    model_name: "gemini-2.5-flash"
    temperature: 0.5
    max_tokens: 0

# Cost estimates (per 1M tokens, as of 2026-02)
# Used for budgeting and cost tracking
cost_per_million_tokens:
