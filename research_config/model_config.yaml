  "gemini-3-flash-preview":
    input: 0.5
    output: 3.0
  "gemini-2.5-flash":
    input: 0.3
    output: 2.5
  "gemini-2.5-flash-lite":
    input: 0.1
    output: 0.40
  "gemini-2.5-pro":
    input: 1.25
    output: 10.00
  "gemini-3-pro-preview":
    input: 2.0
    output: 12.00

  # Anthropic Claude
  "claude-sonnet-4-5-20250929":
    input: 3.00
    output: 15.00
  "claude-haiku-4-5-20251001":
    input: 0.80
    output: 4.00

  # OpenAI
  "gpt-5-nano":
    input: 0.10
    output: 0.30
  "gpt-4o":
    input: 2.50
    output: 10.00
  "gpt-4o-mini":
