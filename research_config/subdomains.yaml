# Subdomain catalog — ground truth for /api/subdomains in M1b.
#
# IDs match the literals the React mockup hardcodes today (app.jsx, today.jsx,
# queue.jsx, novelty.jsx, gaps.jsx). Per-paper assignment to these subdomains
# lands in M3 when the LLM classifier ships; until then `paper_count = 0` for
# every entry but the IDs/names/taglines render correctly in the UI.

subdomains:
  - id: evo_llm_search
    name: LLM Evolutionary Search
    tagline: LLM-guided evolutionary search for algorithm discovery
    category: LLMs for Algorithm Design

  - id: llm_agents_discovery
    name: Agentic Algorithm Discovery
    tagline: Multi-agent LLM workflows that propose, critique, and refine algorithms
    category: LLMs for Algorithm Design

  - id: program_synthesis
    name: Program Synthesis
    tagline: LLMs synthesizing executable programs and heuristics from specs
    category: LLMs for Algorithm Design

  - id: nl_to_opt
    name: Natural Language to Optimization
    tagline: NL → MIP/CP formulation pipelines
    category: Generative AI for OR

  - id: rl_for_opt_modeling
    name: RL for Modeling and Solving
    tagline: Reinforcement learning to formulate or solve OR problems
    category: Generative AI for OR

  - id: or_benchmarks
    name: OR Benchmarks for AI
    tagline: Datasets and benchmarks pairing classical OR with AI baselines
    category: Generative AI for OR

  - id: llm_serving_opt
    name: LLM Serving Optimization
    tagline: OR methods for KV-cache, routing, batching at inference
    category: OR for Generative AI

  - id: gpu_scheduling
    name: GPU and Cluster Scheduling
    tagline: Scheduling and allocation for AI training/serving clusters
    category: OR for Generative AI

  - id: queueing_llm
    name: Queueing for LLM Inference
    tagline: Queueing-theoretic analysis of LLM request handling
    category: OR for Generative AI
