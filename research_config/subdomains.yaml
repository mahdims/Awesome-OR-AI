# Subdomain catalog — ground truth for /api/subdomains in M1b.
#
# IDs match the literals the React mockup hardcodes today (app.jsx, today.jsx,
# queue.jsx, novelty.jsx, gaps.jsx). Per-paper assignment to these subdomains
# lands in M3 when the LLM classifier ships; until then `paper_count = 0` for
# every entry but the IDs/names/taglines render correctly in the UI.

subdomains:
  # ---------------------------------------------------------------------------
  # 1. LLMs for Algorithm Design
  # LLM/evolution/agent-based systems that discover or improve algorithms.
  # ---------------------------------------------------------------------------

  - id: meta_evolution
    name: Meta-Evolution
    tagline: Evolutionary search where the search process itself evolves, such as evolving mutation, selection, memory, prompts, operators, or evaluation strategies
    category: LLMs for Algorithm Design

  - id: algorithm_evolution_for_optimization
    name: Algorithm Evolution for Optimization
    tagline: Evolving algorithms and heuristics tested on classical optimization problems, especially combinatorial optimization, routing, scheduling, packing, and search
    category: LLMs for Algorithm Design

  - id: kernel_evolution
    name: GPU/TPU/NPU Kernel Evolution
    tagline: Evolving low-level kernels, tensor programs, compiler schedules, and hardware-aware code for accelerators
    category: LLMs for Algorithm Design

  - id: rl_tuning_for_evolution
    name: RL Tuning for Self-Improving Evolutionary Design
    tagline: Reinforcement learning methods that tune evolutionary search policies, mutation choices, population control, exploration, or selection during algorithm design
    category: LLMs for Algorithm Design

  - id: test_time_training_algo_design
    name: Test-Time Training for Algorithm Design
    tagline: Methods that adapt, improve, or specialize algorithm-design models during inference or deployment using problem-specific feedback
    category: LLMs for Algorithm Design

  - id: llm_agents_discovery
    name: Agentic Algorithm Discovery
    tagline: Multi-agent LLM workflows that propose, critique, test, debug, and refine algorithms through structured collaboration
    category: LLMs for Algorithm Design

  - id: evolution_for_science
    name: Evolutionary Algorithm Design for Scientific Discovery
    tagline: Evolving algorithms, hypotheses, symbolic rules, or computational procedures for mathematics, health, materials, chemistry, biology, and other scientific domains
    category: LLMs for Algorithm Design

  - id: evolution_for_cloud_systems
    name: Evolutionary Algorithm Design for Cloud and Systems
    tagline: Evolving algorithms for cloud infrastructure, scheduling, resource allocation, compilers, databases, networking, storage, and system-level optimization
    category: LLMs for Algorithm Design

  - id: feedback_reward_algo_design
    name: Feedback and Reward Models for Algorithm Design
    tagline: Execution feedback, process reward models, self-reflection, verbal gradients, unit tests, and trajectory scoring for improving generated algorithms
    category: LLMs for Algorithm Design

  - id: robust_algo_generalization
    name: Robustness and Generalization in Algorithm Discovery
    tagline: Methods that reduce overfitting through diverse benchmarks, adversarial instances, validation protocols, co-evolution, and out-of-distribution testing
    category: LLMs for Algorithm Design


  # ---------------------------------------------------------------------------
  # 2. Generative AI for OR
  # LLMs/foundation models that formulate, solve, explain, or interact with OR tasks.
  # ---------------------------------------------------------------------------

  - id: nl_to_cp_modeling
    name: Natural Language to Constraint Programming
    tagline: Translating textual problem descriptions into CP formulations, including variables, domains, constraints, global constraints, and MiniZinc/CP-SAT-style models
    category: Generative AI for OR

  - id: agentic_opt_modeling
    name: Agentic Optimization Modeling
    tagline: Planner-verifier-debugger agents for formulation decomposition, constraint validation, solver routing, and iterative repair
    category: Generative AI for OR

  - id: rl_for_opt_modeling
    name: Training for OR Modeling
    tagline: RL, DPO, GRPO, SFT, and execution-reward training for generating correct and solvable optimization models
    category: Generative AI for OR

  - id: or_modeling_benchmarks
    name: Optimization Modeling Benchmarks
    tagline: Datasets and evaluation suites for optimization modeling, solver execution, formulation correctness, and LLM's OR reasoning quality
    category: Generative AI for OR

  - id: requirement_clarification_spec_extraction
    name: Requirement Clarification and Specification Extraction
    tagline: Understanding user needs from problem descriptions, extracting entities, objectives, constraints, assumptions, and explaining modeling choices
    category: Generative AI for OR

  - id: interactive_model_analysis
    name: Interactive Model Analysis and Revision
    tagline: Supporting what-if analysis, why-not questions, infeasibility diagnosis, sensitivity analysis, and iterative updates to existing optimization models
    category: Generative AI for OR


  # ---------------------------------------------------------------------------
  # 3. OR for Generative AI
  # Optimization, queueing, scheduling, and resource allocation for AI systems.
  # ---------------------------------------------------------------------------

  - id: llm_serving_opt
    name: LLM Serving and Inference Scheduling
    tagline: Batching, routing, admission control, prefill/decode scheduling, SLO-aware serving, and throughput optimization
    category: OR for Generative AI

  - id: queueing_llm
    name: Queueing and Flow Control for LLM Systems
    tagline: Queueing-theoretic models, stability guarantees, request admission, latency control, and traffic shaping for LLM workloads
    category: OR for Generative AI

  - id: kv_cache_memory_opt
    name: KV Cache and Memory Optimization
    tagline: KV eviction, prefix caching, memory allocation, disaggregated serving, and long-context resource control
    category: OR for Generative AI

  - id: gpu_scheduling
    name: GPU and Cluster Scheduling
    tagline: Heterogeneous GPU allocation, training/serving placement, workload packing, parallelism, and dynamic replanning
    category: OR for Generative AI

  - id: agentic_workflow_orchestration
    name: Agentic Workflow Orchestration
    tagline: OR methods for routing, budgeting, scheduling, and topology design in multi-agent and test-time scaling systems
    category: OR for Generative AI

  - id: inference_compute_allocation
    name: Inference-Time Compute Allocation
    tagline: Optimizing reasoning budgets, rollout allocation, best-of-N, tree search, speculative decoding, and adaptive compute
    category: OR for Generative AI

  - id: model_routing_cascades
    name: Model Routing and Cascades
    tagline: Cost-quality optimization for model selection, cascades, offloading, mixture-of-experts, and multi-model serving
    category: OR for Generative AI